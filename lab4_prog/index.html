<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculator</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <main class="calculator-container">
        <h1>Calculator</h1>
        <div class="calculator">
            <div class="display" role="region" aria-live="polite" aria-atomic="true">
                <div id="operation" class="operation" aria-label="Current operation"></div>
                <div id="current-value" class="current-value" aria-label="Current value">0</div>
            </div>
            <div class="button-grid" role="group" aria-label="Calculator buttons">
                <button type="button" class="clear" data-action="clear" aria-label="Clear all">C</button>
                <button type="button" class="operation" data-action="power" aria-label="Power">^</button>
                <button type="button" class="operation" data-action="sqrt" aria-label="Square root">√</button>
                <button type="button" class="operation" data-action="divide" aria-label="Divide">÷</button>

                <button type="button" class="number" data-value="7" aria-label="7">7</button>
                <button type="button" class="number" data-value="8" aria-label="8">8</button>
                <button type="button" class="number" data-value="9" aria-label="9">9</button>
                <button type="button" class="operation" data-action="multiply" aria-label="Multiply">×</button>

                <button type="button" class="number" data-value="4" aria-label="4">4</button>
                <button type="button" class="number" data-value="5" aria-label="5">5</button>
                <button type="button" class="number" data-value="6" aria-label="6">6</button>
                <button type="button" class="operation" data-action="subtract" aria-label="Subtract">-</button>

                <button type="button" class="number" data-value="1" aria-label="1">1</button>
                <button type="button" class="number" data-value="2" aria-label="2">2</button>
                <button type="button" class="number" data-value="3" aria-label="3">3</button>
                <button type="button" class="operation" data-action="add" aria-label="Add">+</button>

                <button type="button" class="number" data-value="0" aria-label="0">0</button>
                <button type="button" class="number" data-action="decimal" aria-label="Decimal point">.</button>
                <button type="button" class="equals" data-action="equals" aria-label="Equals">=</button>
            </div>
        </div>
    </main>
    <script src="dist/index.js" type="module"></script>
</body>
</html>
